frequencies:
  capture_fps: 10
  ui_parse_fps: 10
  ocr_fps: 2
  state_fps: 10
  decision_fps: 10
  llm_fps: 1
  overlay_fps: 10

thresholds:
  low_total_hp_shield: 0.45
  heal_total_hp_shield: 0.65
  critical_heal_total_hp_shield: 0.35
  broken_shield_heal_hp_pct: 0.55
  push_min_total_hp_shield: 0.95
  high_damage_1s: 0.35
  high_damage_3s: 0.55
  min_damage_event_delta: 0.04
  quiet_damage_1s: 0.05
  ally_isolated_alive_count: 1
  knock_recent_seconds: 2.5
  under_fire_damage_1s: 0.03
  vitals_confidence_min: 0.3
  low_hp_consecutive_frames: 4
  heal_stationary_frames: 4
  retreat_lowhp_stationary_frames: 3
  movement_score_threshold: 0.045
  low_ground_confidence_min: 0.55
  exposed_confidence_min: 0.65

arbiter:
  same_action_cooldown_seconds: 2.0
  retreat_hold_seconds: 1.2
  push_block_after_retreat_seconds: 3.0

overlay:
  enabled: true
  show_window: false
  show_reason: true
  window_name: "ApexCoach"
  window_mode: "hud"         # hud | frame
  window_click_through: true
  window_transparent: true
  window_always_on_top: true
  display_hold_seconds: 3.0
  max_lines: 3
  text_scale: 0.85
  background_alpha: 0.6
  position: "right_center"   # right_center | left_top | custom
  margin_x: 36
  offset_y: 0
  panel_width: 540
  text_x: 36
  text_y: 54
  debug_show_rois: false
  debug_roi_alpha: 0.35
  debug_show_roi_labels: true

offline:
  input_video: ""
  output_video: ""
  telemetry_jsonl: ""

realtime:
  monitor_index: 1
  region_x: 0
  region_y: 0
  region_w: 0
  region_h: 0
  duration_seconds: 0

logging:
  enabled: true
  path: "logs/session_{timestamp}.jsonl"
  include_reason: true

llm:
  enabled: true
  provider: "lmstudio"
  model_name: "" # optional: legacy single-model setting for realtime advice
  model_names: [] # optional: if empty, try loaded LM Studio models in order for realtime advice
  offline_review_model_name: "" # optional: legacy single-model setting for offline review
  offline_review_model_names: [] # optional: if empty, try loaded LM Studio models in order for offline review
  base_url: "http://127.0.0.1:1234/v1"
  timeout_ms: 1200
  temperature: 0.1
  llm_max_tokens: 64
  api_key: "lm-studio"
  timeout_seconds: 45
  num_ctx: 4096
  lmstudio_response_format: "json_schema" # json_schema | text
  max_reason_chars: 48
  min_request_interval_ms: 1000
  parse_retry_count: 1
  failure_threshold: 5
  disable_seconds: 10
  request_log_path: "logs/llm_requests.jsonl"
  max_raw_response_chars: 1200
  mock_return_none: false
  mock_delay_ms: 0
  advice_enabled: true
  frame_reasoning_enabled: false
  offline_review_enabled: true
  offline_review_output: "logs/coach_review_{timestamp}.md"
  offline_review_max_events: 16
  offline_review_max_tokens: 1024
  offline_review_prompt_max_chars: 12000
  offline_review_reason_max_chars: 96
  offline_review_language: "ja"

performance:
  parallel_io: true
  read_prefetch_queue_size: 64
  write_queue_size: 64
  opencv_threads: 0

rois:
  hp_bar: [160, 1006, 270, 24]
  shield_bar: [160, 982, 270, 22]
  teammate_panel: [20, 735, 430, 200]
  kill_feed: [1490, 120, 390, 220]

# ROI calibration
scale_rois_to_frame: true
roi_reference_width: 1920
roi_reference_height: 1080
